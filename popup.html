<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Road GIF Loader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Road GIF Loader</h1>
        <p>ページ読み込み中に表示する Tenor の埋め込みURLを入れてください。</p>
      </header>

      <label class="label" for="gifUrls">Tenor embed URLs</label>
      <textarea
        id="gifUrls"
        class="url-box"
        wrap="off"
        spellcheck="false"
        placeholder="https://tenor.com/embed/123456789&#10;https://tenor.com/ja/view/example-gif-123456789"
      ></textarea>

      <p class="hint">
        横に長いURLはそのまま横スクロールします。Enterを押したときだけ改行され、1行につき1つのGIFとして扱います。
      </p>

      <label class="check-row">
        <input id="randomize" type="checkbox" />
        <span>複数URLがあるときはランダムに表示する</span>
      </label>

      <div class="actions">
        <button id="save" type="button">保存</button>
        <button id="clear" type="button" class="secondary">クリア</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
