<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Road GIF Loader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Road GIF Loader</h1>
        <p>ページ読み込み中に画面へ乗せる Tenor の埋め込みHTMLを入れてください。</p>
      </header>

      <label class="label" for="gifUrls">Tenor embed HTML</label>
      <textarea
        id="gifUrls"
        class="url-box"
        wrap="off"
        spellcheck="false"
        placeholder="&lt;div class=&quot;tenor-gif-embed&quot; data-postid=&quot;25116980&quot; data-share-method=&quot;host&quot; data-aspect-ratio=&quot;1.08844&quot; data-width=&quot;100%&quot;&gt;&lt;a href=&quot;https://tenor.com/view/troll-troll-face-gif-25116980&quot;&gt;Troll Troll Face GIF&lt;/a&gt;&lt;/div&gt; &lt;script type=&quot;text/javascript&quot; async src=&quot;https://tenor.com/embed.js&quot;&gt;&lt;/script&gt;"
      ></textarea>

      <p class="hint">
        横に長い埋め込みHTMLはそのまま横スクロールします。Enterを押したときだけ改行され、1行につき1つのGIFとして扱います。
      </p>

      <label class="check-row">
        <input id="randomize" type="checkbox" />
        <span>複数URLがあるときはランダムに表示する</span>
      </label>

      <div class="actions">
        <button id="save" type="button">保存</button>
        <button id="clear" type="button" class="secondary">クリア</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
